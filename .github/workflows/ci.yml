name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system media tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Validate skill
        run: python .ci/quick_validate_skill.py
      - name: Validate plugin scaffold
        run: python .ci/quick_validate_plugin.py
